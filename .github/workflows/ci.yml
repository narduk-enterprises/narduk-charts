name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run size
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e

  ui-quality:
    name: UI Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run test:e2e:ui
      - run: npm run test:e2e:ui:analyze
      - name: Append UI quality summary
        if: always()
        run: |
          if [ -f output/playwright/ui-quality/summary.md ]; then
            cat output/playwright/ui-quality/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload UI quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-quality-artifacts
          path: |
            output/playwright/ui-quality
            playwright-report
            test-results
          if-no-files-found: warn

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm audit --audit-level=high
