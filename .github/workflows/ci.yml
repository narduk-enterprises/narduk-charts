name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run size
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e

  ui-quality:
    name: UI Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run test:e2e:ui
      - run: npm run test:e2e:ui:analyze
      - name: Append UI quality summary
        if: always()
        run: |
          if [ -f output/playwright/ui-quality/summary.md ]; then
            cat output/playwright/ui-quality/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload UI quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-quality-artifacts
          path: |
            output/playwright/ui-quality
            playwright-report
            test-results
          if-no-files-found: warn
      - name: Comment UI quality results on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        env:
          UI_QUALITY_SUMMARY_PATH: output/playwright/ui-quality/summary.json
        with:
          script: |
            const fs = require('node:fs');

            const marker = '<!-- ui-quality-report -->';
            const summaryPath = process.env.UI_QUALITY_SUMMARY_PATH;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issueNumber = context.payload.pull_request.number;

            let summary = null;
            if (summaryPath && fs.existsSync(summaryPath)) {
              summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            }

            const { data: artifactResponse } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            const artifact = artifactResponse.artifacts.find(
              (item) => item.name === 'ui-quality-artifacts'
            );
            const artifactUrl = artifact
              ? `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${artifact.id}`
              : null;

            const lines = [
              marker,
              '## UI Quality',
              '',
              `- Run: [${context.runId}](${runUrl})`,
              artifactUrl
                ? `- Screenshots artifact: [ui-quality-artifacts](${artifactUrl})`
                : '- Screenshots artifact: unavailable',
            ];

            if (summary) {
              lines.push(`- Score: ${summary.score}`);
              lines.push(`- Screenshots: ${summary.screenshotCount}`);
              lines.push(`- Full-page screenshots: ${summary.fullPageCount}`);
              lines.push(`- Failures: ${summary.failures.length}`);
              lines.push(`- Warnings: ${summary.warnings.length}`);
              lines.push('');
              lines.push('Top captures:');
              for (const shot of summary.screenshots.slice(0, 6)) {
                lines.push(`- \`${shot.path}\` (${shot.width}x${shot.height})`);
              }
            } else {
              lines.push('- Summary: not available');
            }

            lines.push('');
            lines.push(
              'The PNGs are attached to the workflow artifact because GitHub PR comments cannot render Actions artifacts inline.'
            );

            const body = lines.join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm audit --audit-level=high
