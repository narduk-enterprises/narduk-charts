name: Publish package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://code.platform.nard.uk/api/packages/narduk-enterprises/npm/'
          scope: '@narduk-enterprises'

      - name: Verify
        run: |
          npm ci --legacy-peer-deps
          npm run typecheck
          npm test
          npm run build
          npm run size

      - name: Publish to Forgejo Packages
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
